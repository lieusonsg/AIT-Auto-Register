appId: com.aitautoregister.app
productName: AIT Auto Register
copyright: Copyright © 2024

directories:
  output: dist
  buildResources: build

# Auto-update: check GitHub Releases
publish:
  provider: github
  owner: lieusonsg
  repo: AIT-Auto-Register

# Bundle PyInstaller output and frontend static files into resources/
extraResources:
  - from: backend
    to: backend
    filter:
      - "**/*"

mac:
  category: public.app-category.utilities
  target:
    - target: dmg
    - target: zip
  icon: build/icon.icns

win:
  target:
    - target: nsis
  icon: build/icon.ico

linux:
  target:
    - target: AppImage
  category: Utility
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
